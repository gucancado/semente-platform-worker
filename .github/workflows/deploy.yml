name: deploy semente-platform-worker

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: trigger Coolify deploy
        env:
          COOLIFY_API: ${{ secrets.COOLIFY_API }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID_WORKER }}
        run: |
          curl -fsSL -X POST \
            "${COOLIFY_API}/deploy?uuid=${COOLIFY_APP_UUID}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}"
